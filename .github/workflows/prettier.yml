name: Prettier\n\non: [push, pull_request]\n\njobs:\n  format:\n    runs-on: ubuntu-latest\n    steps:\n      - name: Checkout\n        uses: actions/checkout@v2\n      - name: Install pnpm\n        uses: pnpm/action-setup@v2\n        with:\n          version: 9\n      - name: Run Prettier\n        run: pnpm prettier --check .\n        volume: \"./node_modules\"\n