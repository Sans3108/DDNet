name: Prettier Formatting
permissions:
  contents: write
  pull-requests: write

env:
  files_modified:

on:
  push:
    branches: [master]

jobs:
  format:
    # Run on pushes to master, but avoid re-formatting our own formatting commits
    if: |
      github.event_name == 'push' &&
      startsWith(github.event.head_commit.message, 'Format files with Prettier') == false
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Ensures history is checked out
          token: ${{ secrets.GITHUB_TOKEN }} # Use the GitHub token for authentication

      - name: Install pnpm
        uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: 'package.json'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run prettier
        run: pnpm prettier

      - name: Check for modified files
        id: git-check
        run: |
          if git diff --quiet; then
            echo "files_modified=false" >> $GITHUB_ENV
          else
            echo "files_modified=true" >> $GITHUB_ENV
          fi

      - name: Commit and push changes
        if: env.files_modified == 'true'
        run: |
          git config --global user.name '${{ github.repository_owner }}'
          git config --global user.email 'actions@github.com'
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add -A
          git commit -m "Format files with Prettier"
          git push
